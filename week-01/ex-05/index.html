<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy-ChatGPT - Baseline</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f4f9; }
        #chat-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; background: #fff; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 8px; max-width: 80%; line-height: 1.5; }
        .user { background-color: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .assistant { background-color: #e9ecef; color: #333; align-self: flex-start; }
        #input-area { padding: 15px; display: flex; border-top: 1px solid #e0e0e0; }
        #input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        #input-area button { padding: 10px 20px; margin-left: 10px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #context-view { width: 350px; background-color: #212529; color: #f8f9fa; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; font-family: monospace; }
        #context-view h3 { margin-top: 0; border-bottom: 1px solid #495057; padding-bottom: 10px; color: #007bff; }
        #stats { background: #343a40; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        #history-raw { flex: 1; overflow-y: auto; background: #1a1d20; padding: 10px; border-radius: 4px; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div id="context-view">
        <h3>Context & Tokens Explorer</h3>
        <div id="stats">
            <div>Prompt Tokens: <span id="p-tokens">0</span></div>
            <div>Completion Tokens: <span id="c-tokens">0</span></div>
            <div>Total Tokens: <span id="t-tokens">0</span></div>
        </div>
        <div style="margin-bottom: 5px; font-weight: bold; color: #6c757d;">Payload sent to LLM:</div>
        <div id="history-raw">[]</div>
    </div>

    <script>
        let messageHistory = [];

        async function sendMessage() {
            const inputDel = document.getElementById('user-input');
            const text = inputDel.value.trim();
            if (!text) return;

            inputDel.value = '';
            appendMessage('user', text);
            
            // Añadimos al historial que maneja el estado de la sesión
            messageHistory.push({ role: 'user', content: text });
            document.getElementById('history-raw').innerText = JSON.stringify(messageHistory, null, 2);

            try {
                const response = await fetch('http://127.0.0.1:6661/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messageHistory })
                });

                const data = await response.json();
                
                if (response.ok) {
                    appendMessage('assistant', data.answer);
                    messageHistory.push({ role: 'assistant', content: data.answer });
                    
                    // Actualizamos el explorador de tokens
                    document.getElementById('p-tokens').innerText = data.usage.prompt_tokens;
                    document.getElementById('c-tokens').innerText = data.usage.completion_tokens;
                    document.getElementById('t-tokens').innerText = data.usage.total_tokens;
                } else {
                    appendMessage('assistant', `Error: ${data.detail}`);
                }
            } catch (err) {
                appendMessage('assistant', `Error connecting to backend: ${err.message}`);
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            // Si es del asistente, procesamos el Markdown (listas, negritas, código)
            if (role === 'assistant') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.innerText = text;
            }
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
